apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 077437903019.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-frontend:latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer # AWS will create a real URL for you!
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001 # You can visit http://localhost:30001 (if configured in Kind)
