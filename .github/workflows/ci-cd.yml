name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 SECOPS: Scan for secrets
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🏗️ SECOPS: Scan K8s manifests for security misconfigurations
      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          quiet: true # Only show errors

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Backend: Build -> Scan -> Push
      - name: Build Backend image
        run: docker build -t ecommerce-backend ./backend

      - name: 🛡️ Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ecommerce-backend'
          format: 'table'
          exit-code: '0' # Set to 1 in production to stop the build if unsafe
          severity: 'CRITICAL,HIGH'

      - name: Push Backend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ecommerce-backend $ECR_REGISTRY/ecommerce-backend:latest
          docker push $ECR_REGISTRY/ecommerce-backend:latest

      # Frontend: Build -> Scan -> Push
      - name: Build Frontend image
        env:
          VITE_API_URL: http://a9d97f0211a274da08442f6d39336e4c-1162729234.ap-south-1.elb.amazonaws.com/api
        run: |
          docker build -t ecommerce-frontend \
            --build-arg VITE_API_URL=$VITE_API_URL ./frontend

      - name: 🛡️ Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ecommerce-frontend'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ecommerce-frontend $ECR_REGISTRY/ecommerce-frontend:latest
          docker push $ECR_REGISTRY/ecommerce-frontend:latest
